<div
  class="w-full min-w-0 overflow-hidden rounded-3xl border border-white/10 bg-void-card/90 p-4 shadow-card ring-1 ring-white/5 backdrop-blur-md sm:p-5 lg:p-6"
>
  <header class="mb-6 border-b border-white/10 pb-4">
    <h1
      class="bg-gradient-to-r from-aurora-violet to-aurora-cyan bg-clip-text text-2xl font-bold tracking-tight text-transparent sm:text-3xl"
    >
      Tech stack
    </h1>
  </header>

  <div class="grid grid-cols-1 gap-6 md:grid-cols-2 xl:grid-cols-3">
    @for (section of sections; track section.title) {
      <section
        class="flex flex-col rounded-2xl border border-white/10 bg-aurora-soft p-6 shadow-sm transition hover:border-aurora-violet/35 hover:shadow-glow"
      >
        <h2 class="mb-5 flex items-center gap-2 text-lg font-semibold text-void-text">
          <span class="h-1 w-8 rounded-full bg-aurora-bar" aria-hidden="true"></span>
          {{ section.title }}
        </h2>
        <ul class="flex list-none flex-col gap-2.5 p-0">
          @for (item of section.items; track item.label) {
            <li>
              <span
                class="flex items-center gap-3 rounded-xl border border-white/10 bg-void-elevated/90 px-3 py-2.5 text-sm text-void-text shadow-sm transition hover:border-aurora-cyan/25"
              >
                <span
                  class="flex h-10 w-10 shrink-0 items-center justify-center rounded-lg bg-gradient-to-br from-aurora-violet/90 to-aurora-cyan/80 text-lg text-white shadow-glow ring-1 ring-white/10"
                >
                  <i class="{{ item.icon }}" aria-hidden="true"></i>
                </span>
                <span class="font-medium leading-snug">{{ item.label }}</span>
              </span>
            </li>
          }
        </ul>
      </section>
    }

    <section
      class="flex flex-col rounded-2xl border border-aurora-violet/25 bg-gradient-to-br from-aurora-violet/10 via-void-card to-aurora-cyan/10 p-4 shadow-glow ring-1 ring-aurora-cyan/15 sm:p-5 md:col-span-2 xl:col-span-3"
    >
      <h2 class="mb-5 flex items-center gap-2 text-lg font-semibold text-void-text">
        <span
          class="flex h-10 w-10 items-center justify-center rounded-lg bg-void-elevated text-aurora-cyan ring-1 ring-aurora-cyan/30"
        >
          <i class="bi bi-stars" aria-hidden="true"></i>
        </span>
        Problem solving &amp; achievements
      </h2>
      <ul class="grid list-none gap-3 p-0 sm:grid-cols-1 md:grid-cols-3">
        @for (item of achievements; track item.label) {
          <li
            class="flex items-start gap-3 rounded-xl border border-white/10 bg-void-elevated/80 px-4 py-3 text-sm text-void-muted shadow-sm"
          >
            <span
              class="mt-0.5 flex h-9 w-9 shrink-0 items-center justify-center rounded-lg bg-aurora-violet/20 text-aurora-cyan ring-1 ring-aurora-violet/25"
            >
              <i class="{{ item.icon }} text-base" aria-hidden="true"></i>
            </span>
            <span class="leading-snug">{{ item.label }}</span>
          </li>
        }
      </ul>
    </section>
  </div>
</div>
